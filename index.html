<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#2C7A4B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recipe Shopping">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%232C7A4B' width='180' height='180'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'>👨‍🍳</text></svg>">
  <title>Recipe Shopping</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: fixed;
      width: 100%;
      overflow: hidden;
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .search-view {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      background: linear-gradient(135deg, #2C7A4B 0%, #1E5A35 100%);
      color: white;
      padding: 1.5rem 1rem 1rem;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .search-input {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .search-input input {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.95);
    }

    .search-input input::placeholder {
      color: #999;
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-tag {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tag:active {
      background: rgba(255, 255, 255, 0.3);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem;
    }

    .recipe-card {
      background: white;
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      border: 1px solid #eee;
      cursor: pointer;
      transition: all 0.2s;
    }

    .recipe-card:active {
      background: #f9f9f9;
      transform: scale(0.98);
    }

    .recipe-card-restaurant {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
      font-weight: 600;
    }

    .recipe-card-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.25rem;
    }

    .recipe-card-desc {
      font-size: 12px;
      color: #666;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #999;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 1rem;
    }

    .recipe-view {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .recipe-view.active {
      display: flex;
    }

    .recipe-header {
      background: linear-gradient(135deg, #2C7A4B 0%, #1E5A35 100%);
      color: white;
      padding: 0.75rem 1rem 1rem;
      flex-shrink: 0;
    }

    .recipe-header h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .recipe-meta {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 0.5rem;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 0.4rem 0.875rem;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.75rem;
    }

    .back-btn:active {
      background: rgba(255, 255, 255, 0.3);
    }

    /* SERVINGS CONTROL */
    .servings-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: white;
      padding: 0.875rem 1rem;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }

    .servings-label {
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }

    .servings-stepper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 4px;
    }

    .servings-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: white;
      border: 1px solid #ddd;
      font-size: 18px;
      font-weight: 600;
      color: #2C7A4B;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: none;
    }

    .servings-btn:active {
      background: #e8f5ee;
      transform: scale(0.94);
    }

    .servings-value {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      min-width: 28px;
      text-align: center;
    }

    /* TABS */
    .view-tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }

    .view-tab {
      flex: 1;
      text-align: center;
      padding: 0.75rem;
      font-size: 14px;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .view-tab.active {
      color: #2C7A4B;
      border-bottom: 2px solid #2C7A4B;
    }

    .instructions-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem;
      display: none;
    }

    .instructions-list.active {
      display: block;
    }

    .instruction-step {
      display: flex;
      gap: 12px;
      padding: 0.875rem 0.75rem;
      background: white;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      border: 1px solid #eee;
    }

    .step-number {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #2C7A4B;
      color: white;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 14px;
      color: #333;
      line-height: 1.5;
      padding-top: 2px;
    }

    .no-instructions {
      text-align: center;
      padding: 3rem 1rem;
      color: #999;
      font-size: 14px;
    }

    .recipe-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 0.75rem;
      background: white;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease;
      border: 1px solid #eee;
    }

    .item:active {
      background: #f9f9f9;
      transform: scale(0.98);
    }

    .item.checked {
      opacity: 0.5;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #999;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #ddd;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      transition: all 0.2s ease;
    }

    .item.checked .checkbox {
      background: #2C7A4B;
      border-color: #2C7A4B;
    }

    .checkbox::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 2px solid white;
      border-top: 2px solid white;
      transform: rotate(-45deg);
      position: relative;
      top: 2px;
      right: 2px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .item.checked .checkbox::after {
      opacity: 1;
    }

    .item-content {
      flex: 1;
      min-width: 0;
    }

    .item-text {
      font-size: 15px;
      font-weight: 500;
      color: #333;
      line-height: 1.3;
    }

    .item-qty {
      font-size: 12px;
      color: #999;
      margin-top: 0.25rem;
    }

    .progress-container {
      background: white;
      padding: 1rem;
      border-top: 1px solid #eee;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .progress-fill {
      height: 100%;
      background: #2C7A4B;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: #999;
    }

    .footer {
      display: flex;
      gap: 10px;
      padding: 1rem;
      flex-shrink: 0;
      background: white;
      border-top: 1px solid #eee;
    }

    button {
      flex: 1;
      padding: 0.875rem;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:active {
      background: #e0e0e0;
      transform: scale(0.96);
    }

    .btn-primary {
      background: #2C7A4B;
      color: white;
    }

    .btn-primary:active {
      background: #1E5A35;
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- SEARCH VIEW -->
    <div class="search-view" id="searchView">
      <div class="header">
        <h1>👨‍🍳 Copycat Recipes</h1>
        <div class="search-input">
          <input type="text" id="searchInput" placeholder="Search recipes..." oninput="filterRecipes()" />
        </div>
        <div class="filter-tags">
          <div class="filter-tag" onclick="filterByRestaurant('all')">All</div>
          <div class="filter-tag" onclick="filterByRestaurant('Olive Garden')">Olive Garden</div>
          <div class="filter-tag" onclick="filterByRestaurant('Cheesecake Factory')">Cheesecake Factory</div>
          <div class="filter-tag" onclick="filterByRestaurant('Panera Bread')">Panera</div>
          <div class="filter-tag" onclick="filterByRestaurant('Chipotle')">Chipotle</div>
          <div class="filter-tag" onclick="filterByRestaurant('Chick-fil-A')">Chick-fil-A</div>
          <div class="filter-tag" onclick="filterByRestaurant('Panda Express')">Panda Express</div>
          <div class="filter-tag" onclick="filterByRestaurant('Texas Roadhouse')">Texas Roadhouse</div>
        </div>
      </div>
      <div class="content" id="recipeList"></div>
    </div>

    <!-- RECIPE VIEW -->
    <div class="recipe-view" id="recipeView">
      <div class="recipe-header">
        <button class="back-btn" onclick="backToSearch()">← Back</button>
        <h1 id="recipeName">Recipe</h1>
        <div class="recipe-meta" id="recipeMeta"></div>
      </div>
      <div class="servings-control">
        <span class="servings-label">Servings</span>
        <div class="servings-stepper">
          <div class="servings-btn" onclick="changeServings(-1)">−</div>
          <div class="servings-value" id="servingsValue">4</div>
          <div class="servings-btn" onclick="changeServings(1)">+</div>
        </div>
      </div>
      <div class="view-tabs">
        <div class="view-tab active" id="ingredientsTab" onclick="switchTab('ingredients')">Ingredients</div>
        <div class="view-tab" id="instructionsTab" onclick="switchTab('instructions')">Instructions</div>
      </div>
      <div class="recipe-list" id="ingredientList"></div>
      <div class="instructions-list" id="instructionsList"></div>
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-text">
          <span id="checked">0</span> of <span id="total">0</span> items
        </div>
      </div>
      <div class="footer">
        <button class="btn-secondary" id="resetBtn">↻ Reset</button>
        <button class="btn-primary" id="shareBtn">↗ Share</button>
      </div>
    </div>
  </div>

        let allRecipes = [];
    let currentFilter = 'all';
    let currentRecipe = null;
    let currentServings = 4;
    let checkedItems = new Set();

    function buildRecipeList() {
      allRecipes = [];
      Object.entries(recipes).forEach(([restaurant, recipeList]) => {
        Object.entries(recipeList).forEach(([name, data]) => {
          allRecipes.push({
            restaurant,
            name,
            ...data
          });
        });
      });
      displayRecipes();
    }

    function displayRecipes() {
      const recipeList = document.getElementById('recipeList');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = allRecipes.filter(r => {
        const matchesSearch = r.name.toLowerCase().includes(searchTerm) || 
                             r.restaurant.toLowerCase().includes(searchTerm);
        const matchesFilter = currentFilter === 'all' || r.restaurant === currentFilter;
        return matchesSearch && matchesFilter;
      });

      if (filtered.length === 0) {
        recipeList.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>No recipes found</div></div>';
        return;
      }

      recipeList.innerHTML = filtered.map(recipe => `
        <div class="recipe-card" onclick="loadRecipe('${recipe.name.replace(/'/g, "\\'")}', '${recipe.restaurant.replace(/'/g, "\\'")}')">
          <div class="recipe-card-restaurant">${recipe.restaurant}</div>
          <div class="recipe-card-name">${recipe.name}</div>
          <div class="recipe-card-desc">Serves ${recipe.baseServings}</div>
        </div>
      `).join('');
    }

    function filterRecipes() {
      displayRecipes();
    }

    function filterByRestaurant(restaurant) {
      currentFilter = restaurant;
      displayRecipes();
    }

    function loadRecipe(name, restaurant) {
      currentRecipe = allRecipes.find(r => r.name === name && r.restaurant === restaurant);
      if (!currentRecipe) return;

      checkedItems.clear();
      currentServings = currentRecipe.baseServings;

      document.getElementById('recipeName').textContent = currentRecipe.name;
      document.getElementById('recipeMeta').textContent = currentRecipe.restaurant;
      document.getElementById('servingsValue').textContent = currentServings;

      renderIngredients();
      updateProgress();
      switchTab('ingredients');

      document.getElementById('recipeView').classList.add('active');
      document.getElementById('searchView').style.display = 'none';
    }

    function changeServings(delta) {
      const newServings = currentServings + delta;
      if (newServings < 1 || newServings > 24) return;
      currentServings = newServings;
      document.getElementById('servingsValue').textContent = currentServings;
      renderIngredients();
      updateProgress();
    }

    function formatAmount(amount) {
      const rounded = Math.round(amount * 100) / 100;
      
      if (Number.isInteger(rounded)) return rounded.toString();
      
      const fractions = [
        [0.125, '1/8'], [0.25, '1/4'], [0.33, '1/3'], [0.375, '3/8'],
        [0.5, '1/2'], [0.625, '5/8'], [0.67, '2/3'], [0.75, '3/4'], [0.875, '7/8']
      ];
      
      const whole = Math.floor(rounded);
      const decimal = rounded - whole;
      
      for (const [val, frac] of fractions) {
        if (Math.abs(decimal - val) < 0.05) {
          return whole > 0 ? `${whole} ${frac}` : frac;
        }
      }
      
      return rounded.toString();
    }

    function scaleIngredient(ingredient) {
      if (ingredient.amount === null) {
        return { qty: '', name: ingredient.name };
      }
      
      const scaleFactor = currentServings / currentRecipe.baseServings;
      const scaledAmount = ingredient.amount * scaleFactor;
      const formatted = formatAmount(scaledAmount);
      
      const qty = ingredient.unit ? `${formatted} ${ingredient.unit}` : formatted;
      return { qty, name: ingredient.name };
    }

    function renderIngredients() {
      const ingredientList = document.getElementById('ingredientList');
      let html = '';

      Object.entries(currentRecipe.categories).forEach(([category, ingredients]) => {
        if (!ingredients || ingredients.length === 0) return;
        
        html += `<div class="section">
          <div class="section-title">${category}</div>`;
        
        ingredients.forEach(ingredient => {
          const key = `${category}:${ingredient.name}`;
          const isChecked = checkedItems.has(key);
          const scaled = scaleIngredient(ingredient);
          
          html += `
            <div class="item ${isChecked ? 'checked' : ''}" onclick="toggleItem('${key.replace(/'/g, "\\'")}')">
              <div class="checkbox"></div>
              <div class="item-content">
                <div class="item-text">${scaled.name}</div>
                ${scaled.qty ? `<div class="item-qty">${scaled.qty}</div>` : ''}
              </div>
            </div>
          `;
        });
        
        html += '</div>';
      });

      ingredientList.innerHTML = html;
    }

    function switchTab(tab) {
      const ingredientsTab = document.getElementById('ingredientsTab');
      const instructionsTab = document.getElementById('instructionsTab');
      const ingredientList = document.getElementById('ingredientList');
      const instructionsList = document.getElementById('instructionsList');
      const progressContainer = document.querySelector('.progress-container');

      if (tab === 'ingredients') {
        ingredientsTab.classList.add('active');
        instructionsTab.classList.remove('active');
        ingredientList.style.display = 'block';
        instructionsList.classList.remove('active');
        progressContainer.style.display = 'block';
      } else {
        ingredientsTab.classList.remove('active');
        instructionsTab.classList.add('active');
        ingredientList.style.display = 'none';
        instructionsList.classList.add('active');
        progressContainer.style.display = 'none';
        renderInstructions();
      }
    }

    function renderInstructions() {
      const instructionsList = document.getElementById('instructionsList');
      const steps = currentRecipe.instructions;

      if (!steps || steps.length === 0) {
        instructionsList.innerHTML = '<div class="no-instructions">Instructions not added yet for this recipe.</div>';
        return;
      }

      instructionsList.innerHTML = steps.map((step, idx) => `
        <div class="instruction-step">
          <div class="step-number">${idx + 1}</div>
          <div class="step-text">${step}</div>
        </div>
      `).join('');
    }

    function toggleItem(key) {
      if (checkedItems.has(key)) {
        checkedItems.delete(key);
      } else {
        checkedItems.add(key);
      }
      renderIngredients();
      updateProgress();
    }

    function updateProgress() {
      const items = document.querySelectorAll('.item');
      const checked = checkedItems.size;
      const percent = items.length > 0 ? (checked / items.length) * 100 : 0;
      
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('checked').textContent = checked;
      document.getElementById('total').textContent = items.length;
    }

    function backToSearch() {
      document.getElementById('recipeView').classList.remove('active');
      document.getElementById('searchView').style.display = 'flex';
      checkedItems.clear();
      currentRecipe = null;
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      checkedItems.clear();
      renderIngredients();
      updateProgress();
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
      let text = `${currentRecipe.name} - Shopping List\n${currentRecipe.restaurant} • Serves ${currentServings}\n\n`;
      
      Object.entries(currentRecipe.categories).forEach(([category, ingredients]) => {
        if (!ingredients || ingredients.length === 0) return;
        text += `${category}\n`;
        ingredients.forEach(ing => {
          const key = `${category}:${ing.name}`;
          const checked = checkedItems.has(key) ? '✓ ' : '☐ ';
          const scaled = scaleIngredient(ing);
          const qtyPart = scaled.qty ? ` (${scaled.qty})` : '';
          text += `${checked}${scaled.name}${qtyPart}\n`;
        });
        text += '\n';
      });

      if (navigator.share) {
        navigator.share({ title: 'Shopping List', text: text });
      } else {
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('shareBtn');
          const original = btn.textContent;
          btn.textContent = '✓ Copied!';
          setTimeout(() => { btn.textContent = original; }, 2000);
        });
      }
    });

    // Initialize
    buildRecipeList();
  </script>
